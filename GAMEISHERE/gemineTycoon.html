<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Empire Tycoon</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #1a1a2e;
            color: white;
            overflow: hidden;
        }

        /* --- UI Superior --- */
        #top-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-bottom: 2px solid var(--accent);
        }

        .stat { font-weight: bold; font-size: 1.2rem; }

        /* --- Área de Juego (Oficina) --- */
        #game-world {
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #2c3e50, #000000);
            position: relative;
        }

        #office-view {
            width: 400px;
            height: 250px;
            background: #34495e;
            border: 4px solid #bdc3c7;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- Menú de Creación --- */
        #creation-menu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--primary);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            width: 350px;
        }

        input[type="range"] { width: 100%; margin: 10px 0; }
        button {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            margin-top: 10px;
        }

        /* --- Barra de Navegación --- */
        #nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #000;
            height: 60px;
        }

        .nav-item {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-top: 1px solid #333;
        }

        .nav-item:hover { background: var(--accent); }

        #log {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            font-size: 0.8rem;
            max-width: 200px;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="stat">💰 $<span id="money">10000</span></div>
        <div class="stat">🎓 <span id="fans">0</span> Fans</div>
        <div class="stat">📅 <span id="date">04.03.2026</span></div>
    </div>

    <div id="game-world">
        <div id="office-view">
            <h3>Tu Oficina</h3>
            <p>CEO: En línea</p>
            <small>Haz clic en "Crear" para empezar</small>
        </div>

        <div id="creation-menu">
            <h3>Diseñar Smartphone</h3>
            <label>Grosor: <span id="v1">5</span></label>
            <input type="range" id="depth" min="1" max="10" value="5">
            
            <label>Tamaño Pantalla: <span id="v2">6</span>"</label>
            <input type="range" id="size" min="4" max="7" value="6">
            
            <label>Potencia Chip: <span id="v3">1</span></label>
            <input type="range" id="cpu" min="1" max="10" value="1">

            <p>Costo: $<span id="cost">5000</span></p>
            <button onclick="launchDevice()">Lanzar al Mercado</button>
            <button style="background:#c0392b" onclick="toggleMenu()">Cancelar</button>
        </div>
    </div>

    <div id="log">Bienvenido, CEO.</div>

    <div id="nav-bar">
        <div class="nav-item" onclick="toggleMenu()">📱 Crear</div>
        <div class="nav-item">👥 Personal</div>
        <div class="nav-item">📊 Stats</div>
        <div class="nav-item">🛒 Tienda</div>
    </div>

    <script>
        let money = 10000;
        let fans = 0;
        const log = document.getElementById('log');

        // Actualizar valores en tiempo real
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('v1').innerText = document.getElementById('depth').value;
                document.getElementById('v2').innerText = document.getElementById('size').value;
                document.getElementById('v3').innerText = document.getElementById('cpu').value;
                
                // Calcular costo dinámico
                let cost = (document.getElementById('size').value * 500) + (document.getElementById('cpu').value * 1000);
                document.getElementById('cost').innerText = cost;
            });
        });

        function toggleMenu() {
            const menu = document.getElementById('creation-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function launchDevice() {
            const cost = parseInt(document.getElementById('cost').innerText);
            
            if (money >= cost) {
                money -= cost;
                updateUI();
                toggleMenu();
                
                log.innerText = "Lanzando producto... Calculando ventas...";
                
                // Simulación de ventas tras 2 segundos
                setTimeout(() => {
                    const quality = (parseInt(document.getElementById('cpu').value) + parseInt(document.getElementById('size').value)) / 2;
                    const profit = Math.floor(cost * (quality / 2));
                    const newFans = Math.floor(quality * 10);
                    
                    money += profit;
                    fans += newFans;
                    
                    updateUI();
                    log.innerText = `¡Éxito! Ganaste $${profit} y ${newFans} fans.`;
                }, 2000);
            } else {
                alert("No tienes suficiente dinero.");
            }
        }

        function updateUI() {
            document.getElementById('money').innerText = money;
            document.getElementById('fans').innerText = fans;
        }
    </script>
</body>
</html>
